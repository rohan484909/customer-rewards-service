name: Customer Rewards Service - CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:

  # -----------------------------------------------------------------------
  # JOB 1 — BUILD & TEST
  # Runs on every push and pull request
  # -----------------------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs → faster builds

      # Step 3: Give execute permission to Maven wrapper
      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # Step 4: Run tests
      - name: Run unit tests
        run: ./mvnw test

      # Step 5: Build the JAR (skip tests — already ran above)
      - name: Build JAR
        run: ./mvnw package -DskipTests

      # Step 6: Upload the JAR as a build artifact
      # This lets you download the JAR from the GitHub Actions UI
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: rewards-service-jar
          path: target/*.jar
          retention-days: 7     # artifact kept for 7 days

  # -----------------------------------------------------------------------
  # JOB 2 — CODE QUALITY CHECK
  # Runs after build-and-test passes
  # -----------------------------------------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test       # only runs if Job 1 passes

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # Generates test report + checks code coverage
      - name: Generate test report
        run: ./mvnw verify -DskipTests=false

      # Upload test results so you can see them in GitHub Actions UI
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()            # upload even if tests fail
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # -----------------------------------------------------------------------
  # JOB 3 — DEPLOY (only on push to main)
  # Simulates a deployment step
  # Replace this with your actual deployment target:
  #   - AWS Elastic Beanstalk
  #   - Azure App Service
  #   - Render / Railway / Heroku
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ build-and-test, code-quality ]   # only runs if BOTH jobs pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build final JAR for deployment
        run: ./mvnw package -DskipTests

      # ── Replace the step below with your actual deploy command ──────────
      # Example for Render:   curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      # Example for Railway:  railway up
      # Example for AWS EB:   eb deploy
      # ────────────────────────────────────────────────────────────────────
      - name: Deploy (simulation)
        run: |
          echo "✅ Build successful!"
          echo "📦 JAR ready: $(ls target/*.jar)"
          echo "🚀 Deploy your JAR to your hosting platform here"