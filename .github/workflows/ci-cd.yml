name: Customer Rewards Service - CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:    # allows manual trigger from GitHub Actions tab

jobs:

  # -----------------------------------------------------------------------
  # JOB 1 — BUILD & TEST
  # -----------------------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6          # ✅ upgraded from v4 → Node 24

      - name: Set up JDK 17
        uses: actions/setup-java@v5        # ✅ upgraded from v4 → Node 24
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: rewards-service-jar
          path: target/*.jar
          retention-days: 7

  # -----------------------------------------------------------------------
  # JOB 2 — CODE QUALITY
  # -----------------------------------------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6          # ✅ upgraded from v4 → Node 24

      - name: Set up JDK 17
        uses: actions/setup-java@v5        # ✅ upgraded from v4 → Node 24
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Generate test report
        run: ./mvnw verify -DskipTests=false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # -----------------------------------------------------------------------
  # JOB 3 — DEPLOY (only on push to main)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ build-and-test, code-quality ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6          # ✅ upgraded from v4 → Node 24

      - name: Set up JDK 17
        uses: actions/setup-java@v5        # ✅ upgraded from v4 → Node 24
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build final JAR for deployment
        run: ./mvnw package -DskipTests

      - name: Deploy (simulation)
        run: |
          echo "✅ Build successful!"
          echo "📦 JAR ready: $(ls target/*.jar)"
          echo "🚀 Deploy your JAR to your hosting platform here"